name: CI Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  # Nombre del check sin tocar a propósito: "CI Quality Gate / Typecheck + Lint
  # + Test + Audit" es el required check en branch protection, matcheado por
  # string exacto. Renombrarlo (aunque ya no corra audit) rompe ese match para
  # siempre y deja cualquier PR futuro esperando un check que no vuelve a
  # aparecer. El audit real vive en el job de abajo, con nombre propio.
  quality-gate:
    name: Typecheck + Lint + Test + Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ app/

      - name: Tests
        run: npx vitest run

  # No-bloqueante por diseño: nombre de check nuevo, nunca agregado a required
  # checks en branch protection. Corre y reporta de verdad (sin
  # continue-on-error) — si hay vulnerabilidades altas/críticas, el check
  # queda en rojo y visible, simplemente no impide mergear.
  dependency-audit:
    name: Dependency Audit (non-blocking)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit (high+critical only)
        run: npm audit --audit-level=high
